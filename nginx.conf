server {
  listen 3000;

  add_header Access-Control-Allow-Origin "*" always;
  add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
  add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type" always;

  location /manifests/ {
    if ($request_method = OPTIONS) {
      return 204;
    }

    alias /artifacts/manifests/;
    autoindex off;
    expires 60s;
  }

  location /fields/ {
    if ($request_method = OPTIONS) {
      return 204;
    }

    alias /artifacts/fields/;
    autoindex off;
    gzip off;
    default_type application/octet-stream;
    add_header Content-Encoding gzip always;
    add_header Vary Accept-Encoding always;
    expires 60s;
  }

  location /radio/ {
    if ($request_method = OPTIONS) {
      return 204;
    }

    alias /artifacts/radio/;
    autoindex off;
    expires 60s;
  }

  location /pmtiles/ {
    if ($request_method = OPTIONS) {
      return 204;
    }

    alias /artifacts/pmtiles/;
    autoindex off;
    default_type application/octet-stream;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type" always;
    add_header Accept-Ranges "bytes" always;
    expires 60s;
  }

  location / {
    return 404;
  }
}
