services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "3000:3000"
    volumes:
      - ./artifacts:/artifacts:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  frontend:
    build: frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - VITE_ARTIFACT_BASE_URL=http://localhost:3000
      - VITE_BASEMAP_FILENAME=${VITE_BASEMAP_FILENAME:-}
    depends_on:
      - nginx
