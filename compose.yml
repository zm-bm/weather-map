services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "3000:3000"
    volumes:
      - ./artifacts:/artifacts:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  frontend:
    build: frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro
    environment:
      - VITE_ARTIFACT_BASE_URL=${VITE_ARTIFACT_BASE_URL:-http://localhost:5173}
      - VITE_BASEMAP_FILENAME=${VITE_BASEMAP_FILENAME:-}
      - VITE_DEV_ARTIFACT_DELAY_MS=${VITE_DEV_ARTIFACT_DELAY_MS:-0}
      - VITE_DEV_ARTIFACT_PROXY_TARGET=${VITE_DEV_ARTIFACT_PROXY_TARGET:-http://nginx:3000}
      - VITE_DEV_API_PROXY_TARGET=${VITE_DEV_API_PROXY_TARGET:-http://backend:8000}
    depends_on:
      - backend
      - nginx

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/artifacts:ro
      - ./backend/weather_map_backend:/app/backend/weather_map_backend:ro
      - ./infra/config/forecast.etl_config.json:/config/forecast.etl_config.json:ro
    environment:
      - ARTIFACT_ROOT_URI=file:///artifacts
      - PIPELINE_CONFIG_URI=file:///config/forecast.etl_config.json
