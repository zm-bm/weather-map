services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "3000:3000"
    volumes:
      - ./artifacts:/artifacts:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      network: host
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
      - ./config:/app/config:ro
    environment:
      - VITE_ARTIFACT_BASE_URL=${VITE_ARTIFACT_BASE_URL:-http://localhost:5173}
      - VITE_BASEMAP_FILENAME=${VITE_BASEMAP_FILENAME:-}
      - VITE_DEV_ARTIFACT_DELAY_MS=${VITE_DEV_ARTIFACT_DELAY_MS:-0}
      - VITE_DEV_ARTIFACT_PROXY_TARGET=${VITE_DEV_ARTIFACT_PROXY_TARGET:-http://nginx:3000}
      - VITE_DEV_API_PROXY_TARGET=${VITE_DEV_API_PROXY_TARGET:-http://backend:8000}
      - CHOKIDAR_USEPOLLING=${CHOKIDAR_USEPOLLING:-true}
    depends_on:
      - backend
      - nginx

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      network: host
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/artifacts:ro
      - ./backend/weather_map_backend:/app/backend/weather_map_backend:ro
      - ./etl/forecast_etl:/app/etl/forecast_etl:ro
      - ./config:/app/config:ro
    environment:
      - ARTIFACT_ROOT_URI=file:///artifacts

volumes:
  frontend_node_modules:
