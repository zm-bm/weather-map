services:
  frontend:
    build: frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_SERVER_URL=http://localhost:3000
      - VITE_TILES_URL=http://localhost:8081
      - VITE_MANIFEST_BASE_URL=http://localhost:5173/manifests

  martin:
    image: ghcr.io/maplibre/martin:1.3.0
    ports:
      - "3000:3000"
    volumes:
      - ./tileserver:/data:ro
      - ./tileserver/martin.yaml:/etc/martin/martin.yaml:ro
    command: ["--config", "/etc/martin/martin.yaml"]

