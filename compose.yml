services:
  frontend:
    build: frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_TILES_URL=http://localhost:8080

  backend:
    build: backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - ./backend/mbtiles:/app/mbtiles
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=8080
      - MBTILES_ROOT=/app/mbtiles
    command: npm run dev
