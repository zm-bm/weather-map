name: Deploy frontend to S3

on:
  workflow_dispatch: {} # manual trigger
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: weather-map-bucket
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
  FRONTEND_HTML_CACHE_CONTROL: public, max-age=60, s-maxage=300, must-revalidate
  FRONTEND_ASSET_CACHE_CONTROL: public, max-age=31536000, immutable
  FRONTEND_PUBLIC_CACHE_CONTROL: public, max-age=86400, s-maxage=604800

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build
        run: npm run build
        working-directory: ./frontend
        # enables the basemap URL baked into the frontend build.
        env:
          VITE_BASEMAP_FILENAME: 20260424.z6.pmtiles

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync dist/ "s3://${S3_BUCKET}" --delete \
            --exclude ".gitignore" \
            --exclude "*/.gitignore"
        working-directory: ./frontend

      - name: Apply cache headers
        run: |
          aws s3 cp dist/index.html "s3://${S3_BUCKET}/index.html" \
            --cache-control "${FRONTEND_HTML_CACHE_CONTROL}" \
            --content-type "text/html"

          aws s3 cp dist/assets/ "s3://${S3_BUCKET}/assets/" \
            --recursive \
            --cache-control "${FRONTEND_ASSET_CACHE_CONTROL}"

          aws s3 cp dist/ "s3://${S3_BUCKET}" \
            --recursive \
            --exclude "*" \
            --include "cc/*" \
            --include "sunny.svg" \
            --cache-control "${FRONTEND_PUBLIC_CACHE_CONTROL}"
        working-directory: ./frontend

      - name: Invalidate CloudFront
        if: success() && env.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"
