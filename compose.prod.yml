services:
  martin:
    image: ghcr.io/maplibre/martin:1.3.0
    expose:
      - "3001"
    volumes:
      - ./tileserver:/data:ro
      - ./tileserver/martin.yaml:/etc/martin/martin.yaml:ro
    command: ["--config", "/etc/martin/martin.yaml"]

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "3000:3000"
    depends_on:
      - martin
    volumes:
      - ./tileserver:/data:ro
      - ./deploy/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
